name: ci

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: typecheck (src/ only)
        run: bunx tsc --noEmit 2>&1 | tee /tmp/tsc; ! grep -q '^src/' /tmp/tsc
      - run: bun test
